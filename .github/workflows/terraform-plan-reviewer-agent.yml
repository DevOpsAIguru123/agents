name: Terraform Plan Reviewer Agent

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ADK/terraform-plan-reviewer
    env:
      GOOGLE_GENAI_USE_VERTEXAI: "true"
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_TOKEN }}
      TF_IN_AUTOMATION: "true"
      MODEL: gemini-2.5-flash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agent dependencies
        run: python -m pip install -r requirements.txt

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Generate Terraform Cloud plan
        run: |
          terraform -chdir=terraform/gcs-sample init -input=false
          terraform -chdir=terraform/gcs-sample plan -input=false -no-color | tee terraform-cloud-plan.txt

      - name: Review Terraform Cloud plan with ADK agent
        run: |
          echo "Agent review result for Terraform Cloud plan:"
          python run_review.py < terraform/gcs-sample/terraform-cloud-plan.txt | tee terraform-cloud-review.json
          python - <<'PY'
          import json
          result = json.load(open("terraform-cloud-review.json"))
          assert result["recommendation"] == "safe-to-apply", result
          PY

      - name: Review destructive fixture with ADK agent
        run: |
          cat > destroy-plan.txt <<'PLAN'
          Terraform will perform the following actions:

            # google_storage_bucket.sample will be destroyed
            - resource "google_storage_bucket" "sample" {
                - name = "agent-review-destroy-sample" -> null
              }

          Plan: 0 to add, 0 to change, 1 to destroy.
          PLAN

          echo "Agent review result for destructive plan:"
          python run_review.py < destroy-plan.txt | tee destroy-review.json
          python - <<'PY'
          import json
          result = json.load(open("destroy-review.json"))
          assert result["recommendation"] == "approval-required", result
          assert "terraform-destroy" in result["findings"], result
          PY
